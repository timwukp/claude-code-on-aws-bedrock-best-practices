# Audit log rotation for Claude Code
# Deploy at: /etc/logrotate.d/claude-code
# Triggers: weekly + when file exceeds 100MB
#
# IMPORTANT: This config handles `chattr +a` (append-only) protection by
# temporarily removing the attribute during rotation, then re-applying it.

/var/log/claude-code/*.jsonl {
    weekly
    # keep 52 weeks (1 year) — adjust per retention policy
    rotate 52
    # rotate if file exceeds 100MB
    size 100M
    # gzip rotated logs
    compress
    # don't compress the most recent rotation
    delaycompress
    # don't error if log doesn't exist yet
    missingok
    # don't rotate empty logs
    notifempty
    # Use copytruncate because rename would break append-only file
    copytruncate
    sharedscripts
    prerotate
        # Temporarily remove append-only so logrotate can truncate
        /usr/bin/chattr -a /var/log/claude-code/audit.jsonl 2>/dev/null || true
    endscript
    postrotate
        # Re-apply append-only after rotation completes
        /usr/bin/chattr +a /var/log/claude-code/audit.jsonl 2>/dev/null || true
    endscript
}

# For banks with longer retention requirements (e.g., 7 years for SOX):
#   rotate 365     # keep 365 weekly rotations (~7 years)
# Or stream to S3/Glacier via fluentbit/vector for offsite archival
